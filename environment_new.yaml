name: byov
channels:
  - conda-forge
  - defaults
dependencies:
  # 1. 基础环境与核心科学计算库（升级到较新版本以兼容 PyTorch 2.7）
  - python=3.10.4
  - numpy>=1.24.0          # 旧版 1.23 可能兼容，但推荐升级
  - scipy>=1.11.0
  - pandas>=2.0.0
  - scikit-learn>=1.3.0
  - matplotlib>=3.7.0
  - h5py

  # 2. 其他 Conda 工具
  - ffmpeg>=4.4
  - pip

  # 3. ⚠️ 重要：不再通过 Conda 安装 PyTorch 和 cudatoolkit
  #    改为通过 pip 安装（见下方 pip 部分）

  # 4. 所有 Python 包（含 PyTorch、TorchVision、TorchAudio）全部通过 pip 管理
  - pip:
    # ---------- PyTorch 2.7.0+ 官方 CUDA 12.8 版本 ----------
    - torch>=2.7.0          # pip 会自动拉取对应 CUDA 12.8 的 wheel
    - torchvision>=0.22.0
    - torchaudio>=2.7.0

    # ---------- 你原有的其他 pip 包（建议升级版本） ----------
    - open-clip-torch>=2.24.0
    - timm>=1.0.0
    - transformers>=4.46.0
    - huggingface-hub>=0.24.0
    - pytorch-lightning>=2.4.0
    - torchmetrics>=1.5.0
    - opencv-python>=4.10.0
    - plotly>=5.24.0
    - seaborn>=0.13.0

    # 如有其他小众库，继续追加在此